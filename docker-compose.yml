services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-ua_cms}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-ua_cms}
      NEXT_PUBLIC_APP_URL: ${APP_URL:-http://localhost:3000}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      FAL_KEY: ${FAL_KEY}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
      ELEVENLABS_VOICE_ID: ${ELEVENLABS_VOICE_ID}
    depends_on:
      - db
    volumes:
      - .:/app
      - /app/node_modules
      - ./public/media:/app/public/media

volumes:
  pgdata:
